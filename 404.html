<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | KIIT School of Leadership</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/design-system-min.css">
    <link rel="stylesheet" href="/assets/css/mobile-optimization-min.css">
    <link rel="stylesheet" href="/assets/css/mobile-layout-fixes-min.css">

    <!-- Header/Footer Loader -->
    <script src="/assets/js/load-header-footer.js?v=2"></script>

    <style>
        .error-section {
            padding: 120px 0;
            text-align: center;
            min-height: 80vh;
            display: flex;
            align-items: center;
            background: linear-gradient(180deg, rgba(6, 78, 59, 0.03) 0%, rgba(255, 255, 255, 0) 100%);
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: 24px;
            opacity: 0.1;
            letter-spacing: -0.05em;
        }

        .error-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 16px;
            color: var(--color-text-main);
        }

        .error-desc {
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto 40px;
            color: var(--color-text-muted);
        }

        .search-box {
            max-width: 400px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            padding-right: 50px;
            border-radius: 50px;
            border: 2px solid var(--color-border);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(6, 78, 59, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--color-primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .search-btn:hover {
            background: var(--color-primary-dark);
        }

        .quick-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <!-- Header loaded via JS -->

    <main>
        <section class="error-section">
            <div class="container">
                <div class="error-code">404</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-desc">The page you are looking for might have been removed, verified, or is temporarily
                    unavailable.</p>

                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Search our site...">
                    <button class="search-btn"><i class="fa-solid fa-search"></i></button>
                </div>

                <div class="quick-links">
                    <a href="/" class="btn btn-primary">Back to Home</a>
                    <a href="/mba-iev/" class="btn btn-outline">MBA Program</a>
                    <a href="/about/" class="btn btn-outline">About Us</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer loaded via JS -->

</body>

</html>
