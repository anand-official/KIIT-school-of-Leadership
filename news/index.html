<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Updates | KIIT School of Leadership</title>
    <meta name="description"
        content="Stay updated with the latest news, announcements, and achievements from KIIT School of Leadership. Read about our students, faculty, and institutional developments.">
    <meta name="keywords"
        content="KIIT School of Leadership News, KIIT University Updates, Business School News India, Leadership Education Updates">
    <meta name="author" content="KIIT School of Leadership">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://sld.kiit.ac.in/news/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sld.kiit.ac.in/news/">
    <meta property="og:title" content="News & Updates | KIIT School of Leadership">
    <meta property="og:description"
        content="Stay updated with the latest news, announcements, and achievements from KIIT School of Leadership.">
    <meta property="og:image" content="https://sld.kiit.ac.in/assets/images/logo/ksld-logo.webp">
    <meta property="og:site_name" content="KIIT School of Leadership">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/design-system-min.css">
    <link rel="stylesheet" href="/assets/css/mobile-optimization-min.css">
    <link rel="stylesheet" href="/assets/css/mobile-layout-fixes-min.css">

    <!-- JSON-LD Breadcrumb Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [{
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://sld.kiit.ac.in/"
        },{
            "@type": "ListItem",
            "position": 2,
            "name": "News",
            "item": "https://sld.kiit.ac.in/news/"
        }]
    }
    </script>

    <style>
        /* Light background color */
        .bg-light {
            background-color: #f9fafb;
        }

        /* Section padding */
        .section {
            padding: clamp(3rem, 8vh, 5rem) 0;
        }

        /* Text muted color */
        :root {
            --color-text-muted: #6b7280;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- News Section -->
    <section class="section bg-light">
        <div class="container">
            <div style="margin-bottom: 40px;">
                <h2 style="margin-bottom: 8px;">Latest News & Updates</h2>
                <p style="font-size: 1.125rem; color: var(--color-text-muted); margin-top: 12px;">Stay updated with the
                    latest developments at KIIT School of Leadership</p>
            </div>
        </div>

        <!-- News Embed with Hidden Header/Footer -->
        <div style="margin-bottom: 0; padding: 0 20px;">
            <div
                style="position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.12); background: #ffffff; max-width: 1400px; margin: 0 auto; height: 800px;">
                <!-- Gradient Accent Top Bar -->
                <div
                    style="position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #10b981 0%, #059669 50%, #047857 100%); z-index: 10;">
                </div>
                <!-- Top overlay to cover any header remnants -->
                <div
                    style="position: absolute; top: 5px; left: 0; right: 0; height: 20px; background: #ffffff; z-index: 8;">
                </div>
                <!-- Iframe container - clips the header and footer -->
                <div style="position: relative; width: 100%; height: 100%; overflow: hidden; padding-top: 20px;">
                    <iframe src="https://news.kiit.ac.in/kiitnews/"
                        style="position: absolute; top: -420px; left: 0; width: 100%; height: calc(100% + 700px); border: none; background: #ffffff;"
                        scrolling="yes" loading="lazy" title="KIIT News"></iframe>
                </div>
                <!-- Bottom fade overlay to hide footer cutoff -->
                <div
                    style="position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, #ffffff 20%, transparent 100%); z-index: 5; pointer-events: none;">
                </div>
            </div>
        </div>

        <div class="container">
            <!-- Premium CTA Section -->
            <div style="background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(16, 185, 129, 0.04) 100%); border: 2px solid rgba(16, 185, 129, 0.15); border-radius: 16px; padding: 40px 32px; text-align: center; transition: all 0.3s ease; margin-top: 40px;"
                onmouseover="this.style.borderColor='rgba(16, 185, 129, 0.4)'; this.style.backgroundColor='rgba(16, 185, 129, 0.12)'"
                onmouseout="this.style.borderColor='rgba(16, 185, 129, 0.15)'; this.style.backgroundColor='rgba(16, 185, 129, 0.08)'">
                <div style="margin-bottom: 20px;">
                    <h4
                        style="margin: 0 0 12px 0; font-size: 1.25rem; color: #1f2937; font-weight: 700; letter-spacing: -0.5px;">
                        Want to explore all stories?</h4>
                    <p style="margin: 0; color: var(--color-text-muted); font-size: 0.95rem; line-height: 1.6;">Discover
                        comprehensive news, announcements, and achievements from KIIT across all initiatives</p>
                </div>
                <a href="https://news.kiit.ac.in/kiitnews/" target="_blank" rel="noopener"
                    style="display: inline-flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 14px 32px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.95rem; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); width: fit-content;">
                    Visit KIIT News Portal
                    <i class="fa-solid fa-arrow-right" style="font-size: 0.85rem;"></i>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/assets/js/load-header-footer.js"></script>
    <script src="/assets/js/main.js"></script>
</body>

</html>
